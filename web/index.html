<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>crosscode-typedef-inserter-web</title>
    </head>
    <body>
        <main id="app">
            <div class="panels">
                <section class="panel">
                    <label>game code (input)</label>
                    <div id="input-code" class="editor-mount"></div>
                    <div class="row">
                        <button id="upload-btn">upload file</button>
                        <button id="run-btn">run</button>
                        <button id="clear-btn">clear cache</button>
                        <input type="file" id="file-input" hidden />
                    </div>
                </section>

                <section class="panel">
                    <label>typed game code (output)</label>
                    <div id="output-code" class="editor-mount"></div>
                    <div class="row">
                        <button id="download-btn">download file</button>
                    </div>
                </section>
            </div>

            <section class="console-section">
                <label>console</label>
                <div id="console-output" class="editor-mount"></div>
            </section>
        </main>
        <script type="module" src="/src/main.ts"></script>
    </body>
</html>
